  <style>
    :root {
      --surface: #f9f9ff;
      --surface-lowest: #ffffff;
      --outline-variant: #c1c6d6;
      --on-surface: #191c23;
      --on-surface-variant: #414754;
      --primary: #005bbf;
      --primary-container: #1a73e8;
      --error: #d93025;
      --shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--surface);
      color: var(--on-surface);
      font-family: "Inter", sans-serif;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: var(--surface-lowest);
      border: 1px solid var(--outline-variant);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 28px 20px;
      text-align: center;
    }

    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 16px;
      border-radius: 9999px;
      display: grid;
      place-items: center;
      background: #ffe9e9;
      color: var(--error);
      font-size: 42px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 32px;
      letter-spacing: -0.01em;
    }

    p {
      margin: 10px 0 24px;
      color: var(--on-surface-variant);
      font-size: 16px;
      line-height: 24px;
    }

    .btn {
      width: 100%;
      min-height: 56px;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: background-color 0.2s ease;
    }

    .btn:hover { background: var(--primary-container); }
  </style>
</head>
<body>
  <section class="card">
    <div class="icon">!</div>
    <h1>QR Code Expired</h1>
    <p>This payment session has timed out for your security. Please create a new payment request.</p>
    <button class="btn" type="button" onclick="window.location.href='index.html'">New Payment</button>
  </section>
</body>
</html>
